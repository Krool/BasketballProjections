<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>March Madness 2026 Draft Board</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e4e6ed;
    --text-dim: #8b8fa3;
    --accent: #4f8cff;
    --accent-dim: #2a4a8a;
    --green: #34d399;
    --red: #f87171;
    --orange: #fbbf24;
    --purple: #a78bfa;
    --drafted-bg: #1a1d27;
    --drafted-text: #4a4e5e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #242836 100%);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header h1 span { color: var(--accent); }

  .stats-bar {
    display: flex;
    gap: 20px;
    font-size: 13px;
  }

  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-value { font-weight: 700; font-size: 15px; }
  .stat-label { color: var(--text-dim); font-size: 12px; }
  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--orange); }
  .stat-value.purple { color: var(--purple); }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 12px;
    width: 170px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent); }

  select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    color: var(--text);
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }

  .toggle-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .toggle-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--text);
  }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { background: var(--border); }
  .btn.danger { color: var(--red); }
  .btn.danger:hover { background: rgba(248, 113, 113, 0.15); }

  /* 3-column layout */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr 260px;
    height: calc(100vh - 90px);
    overflow: hidden;
  }

  .col-left, .col-right {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
  }

  .col-right {
    border-right: none;
    border-left: 1px solid var(--border);
  }

  .col-center {
    overflow-y: auto;
    padding: 12px 16px;
  }

  .col-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .col-left .col-title { color: var(--purple); }
  .col-right .col-title { color: var(--text-dim); }

  /* Best available banner */
  .best-available {
    background: linear-gradient(135deg, rgba(79, 140, 255, 0.08) 0%, rgba(52, 211, 153, 0.06) 100%);
    border: 1px solid var(--accent-dim);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .best-available-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    font-weight: 600;
  }

  .best-available-player {
    font-size: 16px;
    font-weight: 700;
  }

  .best-available-details {
    font-size: 12px;
    color: var(--text-dim);
  }

  .best-available-pts {
    margin-left: auto;
    font-size: 22px;
    font-weight: 800;
    color: var(--green);
  }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  thead th {
    background: var(--surface);
    padding: 8px 8px;
    text-align: left;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }
  thead th .sort-arrow { margin-left: 3px; font-size: 9px; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 7px 8px;
    white-space: nowrap;
  }

  tr.drafted {
    background: var(--drafted-bg) !important;
    opacity: 0.35;
  }

  tr.drafted td { text-decoration: line-through; color: var(--drafted-text); }

  tr.my-team {
    background: rgba(167, 139, 250, 0.08) !important;
    opacity: 1;
  }

  tr.my-team td { text-decoration: none; color: var(--text); }

  .rank-cell { font-weight: 700; color: var(--text-dim); width: 28px; padding-right: 2px; }
  .player-cell { font-weight: 600; padding-left: 2px; }
  .team-cell { color: var(--text-dim); }
  .region-cell { font-size: 11px; color: var(--text-dim); }

  .seed-badge {
    display: inline-block;
    background: var(--surface2);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 700;
    min-width: 24px;
    text-align: center;
  }

  .seed-1 { background: rgba(52, 211, 153, 0.2); color: var(--green); }
  .seed-2 { background: rgba(79, 140, 255, 0.2); color: var(--accent); }
  .seed-3 { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
  .seed-4 { background: rgba(251, 191, 36, 0.2); color: var(--orange); }

  .pts-cell {
    font-weight: 800;
    font-size: 13px;
    color: var(--green);
  }

  .fav-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 18px;
    padding: 2px 4px;
    line-height: 1;
    color: #555;
    transition: all 0.15s;
  }

  .fav-btn:hover { color: var(--orange); }
  .fav-btn.active { color: var(--orange); }

  .draft-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .draft-btn:hover {
    border-color: var(--red);
    color: var(--red);
    background: rgba(248, 113, 113, 0.1);
  }

  .we-draft-btn {
    background: transparent;
    border: 1px solid rgba(167, 139, 250, 0.3);
    border-radius: 4px;
    padding: 3px 6px;
    color: var(--purple);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 600;
  }

  .we-draft-btn:hover {
    border-color: var(--purple);
    background: rgba(167, 139, 250, 0.15);
  }

  tr.drafted .draft-btn {
    border-color: var(--drafted-text);
    color: var(--drafted-text);
    text-decoration: none;
    opacity: 1;
  }

  tr.drafted .draft-btn:hover {
    border-color: var(--green);
    color: var(--green);
    background: rgba(52, 211, 153, 0.1);
  }

  tr.my-team .we-draft-btn {
    border-color: var(--purple);
    background: rgba(167, 139, 250, 0.2);
    color: var(--purple);
  }

  .my-team-badge {
    font-size: 9px;
    font-weight: 700;
    color: var(--purple);
    margin-left: 4px;
    text-decoration: none !important;
  }

  .conflict-warn {
    color: var(--orange);
    font-size: 11px;
    margin-left: 4px;
    cursor: help;
    text-decoration: none !important;
  }

  .conflict-preview {
    color: var(--orange);
    font-size: 10px;
    margin-left: 4px;
    cursor: help;
    opacity: 0.7;
  }

  .pick-number {
    font-size: 10px;
    color: var(--orange);
    font-weight: 600;
  }

  .injury-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 4px;
  }

  .injury-dot.healthy { background: var(--green); }
  .injury-dot.questionable { background: var(--orange); }
  .injury-dot.out { background: var(--red); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* My Team panel (left column) */
  .my-team-region {
    margin-bottom: 12px;
  }

  .my-team-region-header {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }

  .region-conflict-badge {
    color: var(--orange);
    font-size: 10px;
    font-weight: 600;
  }

  .my-team-player {
    padding: 5px 2px;
    border-bottom: 1px solid rgba(46, 51, 69, 0.4);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .my-team-player-name { font-weight: 600; font-size: 12px; }
  .my-team-player-team { color: var(--text-dim); font-size: 11px; }
  .my-team-player-pts { color: var(--green); font-weight: 700; font-size: 12px; }

  .my-team-player-remove {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    padding: 1px 4px;
    border-radius: 3px;
    margin-left: 4px;
    transition: all 0.15s;
  }

  .my-team-player-remove:hover {
    color: var(--red);
    background: rgba(248, 113, 113, 0.1);
  }

  .my-team-total {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 2px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    font-size: 13px;
  }

  .my-team-total-pts { color: var(--green); }

  .my-team-conflicts {
    margin-bottom: 12px;
    padding: 8px;
    background: rgba(251, 191, 36, 0.08);
    border: 1px solid rgba(251, 191, 36, 0.2);
    border-radius: 6px;
    font-size: 11px;
  }

  .my-team-conflicts-title {
    font-weight: 700;
    color: var(--orange);
    margin-bottom: 4px;
    font-size: 11px;
  }

  .conflict-item {
    padding: 3px 0;
    color: var(--text-dim);
    line-height: 1.3;
  }

  .my-team-empty {
    color: var(--text-dim);
    font-size: 12px;
    padding: 16px 0;
    text-align: center;
    line-height: 1.5;
  }

  /* Draft log (right column) */
  .draft-log-item {
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .draft-log-item .pick-num { color: var(--orange); font-weight: 700; margin-right: 4px; font-size: 11px; }
  .draft-log-item .pick-player { font-weight: 600; font-size: 12px; }
  .draft-log-item .pick-team { color: var(--text-dim); font-size: 11px; }

  /* Mobile tabs */
  .mobile-tabs {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .mobile-tabs button {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 10px 0;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .mobile-tabs button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .mobile-tabs button[data-tab="my-team"].active {
    color: var(--purple);
    border-bottom-color: var(--purple);
  }

  @media (max-width: 1200px) {
    .layout {
      grid-template-columns: 240px 1fr 220px;
    }
  }

  @media (max-width: 900px) {
    .mobile-tabs {
      display: flex;
    }
    .layout {
      grid-template-columns: 1fr;
      height: calc(100vh - 130px);
    }
    .col-left, .col-right, .col-center {
      display: none;
      border: none;
      overflow-y: auto;
    }
    .col-left.mobile-active,
    .col-right.mobile-active,
    .col-center.mobile-active {
      display: block;
    }
    .header { padding: 10px 12px; }
    .stats-bar { gap: 12px; flex-wrap: wrap; }
    .controls { gap: 5px; }
    .search-box { width: 140px; }

    /* Hide columns on mobile to prevent horizontal scrolling */
    .col-team, .col-region, .col-seed { display: none; }
    .col-fav { padding: 0 2px; }
    .fav-btn { font-size: 16px; padding: 4px 2px; }

    /* Compact player names on mobile */
    .player-cell {
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Hide sort arrows on mobile */
    .sort-arrow { display: none !important; }

    /* Compact action buttons on mobile */
    .we-draft-btn .btn-full { display: none; }
    .we-draft-btn .btn-short { display: inline; }
    .draft-btn .btn-full { display: none; }
    .draft-btn .btn-short { display: inline; }
  }

  /* Desktop: show full text, hide short text */
  @media (min-width: 901px) {
    .we-draft-btn .btn-short { display: none; }
    .draft-btn .btn-short { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>March Madness <span>2026</span> Draft Board</h1>
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value green" id="available-count">0</span>
        <span class="stat-label">Available</span>
      </div>
      <div class="stat">
        <span class="stat-value orange" id="drafted-count">0</span>
        <span class="stat-label">Drafted</span>
      </div>
      <div class="stat">
        <span class="stat-value purple" id="my-team-count">0</span>
        <span class="stat-label">My Team</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="pick-number">Pick 1</span>
      </div>
    </div>
  </div>
  <div class="controls">
    <input type="text" class="search-box" id="search" placeholder="Search player or team...">
    <select id="team-filter"><option value="">All Teams</option></select>
    <select id="seed-filter"><option value="">All Seeds</option></select>
    <select id="region-filter"><option value="">All Regions</option></select>
    <button class="toggle-btn active" id="hide-drafted">Hide Drafted</button>
    <button class="toggle-btn" id="show-favs">Favorites</button>
    <button class="btn" id="clear-filters">Clear Filters</button>
    <button class="btn" id="undo-btn">Undo</button>
    <button class="btn" id="export-btn">Export</button>
    <span style="flex:1"></span>
    <button class="btn danger" id="reset-btn">Reset Draft</button>
  </div>
</div>

<div class="mobile-tabs" id="mobile-tabs">
  <button data-tab="my-team">My Team</button>
  <button data-tab="board" class="active">Draft Board</button>
  <button data-tab="log">Draft Log</button>
</div>

<div class="layout">
  <!-- Left column: My Team -->
  <div class="col-left">
    <div class="col-title">My Team</div>
    <div id="my-team-content"></div>
  </div>

  <!-- Center: Draft board -->
  <div class="col-center mobile-active">
    <div class="best-available" id="best-available">
      <div>
        <div class="best-available-label">Best Available</div>
        <div class="best-available-player" id="ba-player">--</div>
        <div class="best-available-details" id="ba-details">--</div>
      </div>
      <div class="best-available-pts" id="ba-pts">--</div>
    </div>

    <table>
      <thead>
        <tr>
          <th data-sort="rank" class="sorted" title="Overall rank by projected tournament points"># <span class="sort-arrow">&#9650;</span></th>
          <th class="col-fav" title="Favorite players for quick reference" style="width:30px;text-align:center;cursor:default;">&#9733;</th>
          <th data-sort="player" title="Player name">Player</th>
          <th data-sort="team" class="col-team" title="College team">Team</th>
          <th data-sort="region" class="col-region" title="Bracket region">Region</th>
          <th data-sort="seed" class="col-seed" title="Tournament seed (1 = best)">Seed</th>
          <th data-sort="ppg" title="Points per game — season average">PPG</th>
          <th data-sort="expected_games" title="Expected tournament games — simulated using KenPom efficiency ratings and bracket matchups">Exp.G</th>
          <th data-sort="projected_points" title="Projected Points = PPG x Expected Games — total expected scoring output across the tournament">Pts</th>
          <th title="Injury status">Inj</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="no-results" id="no-results" style="display:none;">No players match your filters.</div>
  </div>

  <!-- Right column: Draft Log -->
  <div class="col-right">
    <div class="col-title">Draft Log</div>
    <div id="draft-log-list"></div>
  </div>
</div>

<script>
let players = [];
let drafted = new Set();
let myTeam = new Set();
let favorites = new Set();
let draftOrder = [];
let sortCol = 'rank';
let sortAsc = true;
let hideDrafted = true;
let showFavsOnly = false;

const REGIONS = {
  "East": ["Duke","Siena","Ohio St.","TCU","St. John's","Northern Iowa","Kansas","Cal Baptist","Louisville","South Florida","Michigan St.","North Dakota St.","UCLA","UCF","Connecticut","Furman"],
  "West": ["Arizona","LIU","Villanova","Utah St.","Wisconsin","High Point","Arkansas","Hawaii","BYU","N.C. State","Gonzaga","Kennesaw St.","Miami FL","Missouri","Purdue","Queens"],
  "Midwest": ["Michigan","UMBC","Georgia","Saint Louis","Texas Tech","Akron","Alabama","Hofstra","Tennessee","SMU","Virginia","Wright St.","Kentucky","Santa Clara","Iowa St.","Tennessee St."],
  "South": ["Florida","Lehigh","Clemson","Iowa","Vanderbilt","McNeese","Nebraska","Troy","North Carolina","VCU","Illinois","Penn","Saint Mary's","Texas A&M","Houston","Idaho"]
};

const BRACKET_SIDES = { "East": "A", "West": "A", "South": "B", "Midwest": "B" };

function getTeamRegion(team) {
  for (const [region, teams] of Object.entries(REGIONS)) {
    if (teams.includes(team)) return region;
  }
  return null;
}

function getConflictLevel(team1, team2) {
  if (team1 === team2) return null;
  const r1 = getTeamRegion(team1), r2 = getTeamRegion(team2);
  if (!r1 || !r2) return null;
  if (r1 === r2) return 'region';
  if (BRACKET_SIDES[r1] === BRACKET_SIDES[r2]) return 'semifinal';
  return null;
}

function getProspectiveConflicts(player) {
  const conflicts = [];
  for (const rank of myTeam) {
    const other = players.find(p => p.rank === rank);
    if (!other) continue;
    const level = getConflictLevel(player.team, other.team);
    if (level) {
      conflicts.push({ player: other, level });
    }
  }
  return conflicts;
}

const STORAGE_KEY = 'mm2026_draft';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const state = JSON.parse(saved);
      drafted = new Set(state.drafted || []);
      myTeam = new Set(state.myTeam || []);
      favorites = new Set(state.favorites || []);
      draftOrder = state.draftOrder || [];
    }
  } catch(e) {}
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    drafted: [...drafted],
    myTeam: [...myTeam],
    favorites: [...favorites],
    draftOrder
  }));
}

function seedClass(seed) {
  if (seed <= 4) return `seed-${seed}`;
  return '';
}

function injuryClass(status) {
  if (!status) return 'healthy';
  const s = status.toLowerCase();
  if (s.includes('out') || s.includes('season')) return 'out';
  if (s.includes('question') || s.includes('day') || s.includes('return')) return 'questionable';
  return 'healthy';
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const teamFilter = document.getElementById('team-filter').value;
  const seedFilter = document.getElementById('seed-filter').value;
  const regionFilter = document.getElementById('region-filter').value;

  let filtered = players.filter(p => {
    if (hideDrafted && drafted.has(p.rank) && !myTeam.has(p.rank)) return false;
    if (showFavsOnly && !favorites.has(p.rank)) return false;
    if (search && !p.player.toLowerCase().includes(search) && !p.team.toLowerCase().includes(search)) return false;
    if (teamFilter && p.team !== teamFilter) return false;
    if (seedFilter && p.seed !== parseInt(seedFilter)) return false;
    if (regionFilter && getTeamRegion(p.team) !== regionFilter) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'region') {
      va = getTeamRegion(a.team) || '';
      vb = getTeamRegion(b.team) || '';
    }
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  return filtered;
}

function getBestAvailable() {
  return players
    .filter(p => !drafted.has(p.rank))
    .sort((a, b) => b.projected_points - a.projected_points)[0];
}

function updateStats() {
  const avail = players.length - drafted.size;
  document.getElementById('available-count').textContent = avail;
  document.getElementById('drafted-count').textContent = drafted.size;
  document.getElementById('my-team-count').textContent = myTeam.size;
  document.getElementById('pick-number').textContent = `Pick ${drafted.size + 1}`;

  const best = getBestAvailable();
  if (best) {
    document.getElementById('ba-player').textContent = best.player;
    document.getElementById('ba-details').textContent = `${best.team} (${best.seed}) | ${best.ppg} PPG | ${best.expected_games} exp. games`;
    document.getElementById('ba-pts').textContent = Math.round(best.projected_points);
  } else {
    document.getElementById('ba-player').textContent = 'All players drafted';
    document.getElementById('ba-details').textContent = '';
    document.getElementById('ba-pts').textContent = '--';
  }
}

function updateDraftLog() {
  const list = document.getElementById('draft-log-list');
  if (draftOrder.length === 0) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:12px 0;text-align:center;">No picks yet.</div>';
    return;
  }
  list.innerHTML = draftOrder.map((rank, i) => {
    const p = players.find(pl => pl.rank === rank);
    if (!p) return '';
    const isOurs = myTeam.has(rank);
    return `<div class="draft-log-item">
      <span class="pick-num">#${i + 1}</span>
      <span class="pick-player">${p.player}</span>${isOurs ? '<span class="my-team-badge">OURS</span>' : ''}<br>
      <span class="pick-team">${p.team} (${p.seed}) — ${Math.round(p.projected_points)} pts</span>
    </div>`;
  }).reverse().join('');
}

function updateMyTeamPanel() {
  const content = document.getElementById('my-team-content');

  if (myTeam.size === 0) {
    content.innerHTML = '<div class="my-team-empty">Use "Us" to add players to your team.<br><br>"Draft" marks picks by other teams.</div>';
    return;
  }

  const myPlayers = players.filter(p => myTeam.has(p.rank));

  // Group by region
  const byRegion = {};
  for (const p of myPlayers) {
    const region = getTeamRegion(p.team) || 'Unknown';
    if (!byRegion[region]) byRegion[region] = [];
    byRegion[region].push(p);
  }

  // Find all conflicts
  const allConflicts = [];
  for (let i = 0; i < myPlayers.length; i++) {
    for (let j = i + 1; j < myPlayers.length; j++) {
      const level = getConflictLevel(myPlayers[i].team, myPlayers[j].team);
      if (level) {
        allConflicts.push({ p1: myPlayers[i], p2: myPlayers[j], level });
      }
    }
  }

  let html = '';

  // Conflict warnings at the top
  if (allConflicts.length > 0) {
    html += `<div class="my-team-conflicts">
      <div class="my-team-conflicts-title">&#9888; Bracket Conflicts</div>`;
    for (const c of allConflicts) {
      const desc = c.level === 'region'
        ? `Same region — one eliminates the other`
        : `Same side — could meet in Final Four`;
      html += `<div class="conflict-item">
        <strong>${c.p1.team}</strong> vs <strong>${c.p2.team}</strong> — ${desc}
      </div>`;
    }
    html += '</div>';
  }

  // Region sections
  for (const region of ['East', 'West', 'South', 'Midwest', 'Unknown']) {
    const rPlayers = byRegion[region];
    if (!rPlayers || rPlayers.length === 0) continue;

    const regionTeams = [...new Set(rPlayers.map(p => p.team))];
    const hasConflict = region !== 'Unknown' && regionTeams.length > 1;

    html += `<div class="my-team-region">
      <div class="my-team-region-header">
        <span>${region}</span>
        ${hasConflict ? `<span class="region-conflict-badge">&#9888; ${regionTeams.length} teams</span>` : ''}
      </div>`;

    for (const p of rPlayers.sort((a, b) => b.projected_points - a.projected_points)) {
      html += `<div class="my-team-player">
        <div>
          <div class="my-team-player-name">${p.player}</div>
          <div class="my-team-player-team">${p.team} (#${p.seed})</div>
        </div>
        <div style="display:flex;align-items:center;gap:3px;">
          <span class="my-team-player-pts">${Math.round(p.projected_points)}</span>
          <button class="my-team-player-remove" onclick="toggleMyTeam(${p.rank})" title="Remove from team">&times;</button>
        </div>
      </div>`;
    }

    html += '</div>';
  }

  // Total
  const totalPts = myPlayers.reduce((sum, p) => sum + p.projected_points, 0);
  html += `<div class="my-team-total">
    <span>${myPlayers.length} player${myPlayers.length !== 1 ? 's' : ''}</span>
    <span class="my-team-total-pts">${Math.round(totalPts)} pts</span>
  </div>`;

  content.innerHTML = html;
}

function render() {
  const filtered = getFiltered();
  const tbody = document.getElementById('table-body');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('no-results').style.display = 'block';
  } else {
    document.getElementById('no-results').style.display = 'none';
    tbody.innerHTML = filtered.map(p => {
      const isDrafted = drafted.has(p.rank);
      const isMyTeam = myTeam.has(p.rank);
      const isDraftedByOthers = isDrafted && !isMyTeam;
      const pickIdx = draftOrder.indexOf(p.rank);
      const ic = injuryClass(p.injury_status);
      const region = getTeamRegion(p.team) || '?';

      // Conflict info
      let conflictHtml = '';
      if (isMyTeam) {
        const conflicts = getProspectiveConflicts(p);
        const otherConflicts = conflicts.filter(c => c.player.rank !== p.rank);
        if (otherConflicts.length > 0) {
          const names = otherConflicts.map(c => c.player.team).join(', ');
          const hasRegion = otherConflicts.some(c => c.level === 'region');
          conflictHtml = `<span class="conflict-warn" title="Bracket conflict with your ${names}${hasRegion ? ' (same region!)' : ' (same bracket side)'}">&#9888;</span>`;
        }
      } else if (!isDrafted && myTeam.size > 0) {
        const conflicts = getProspectiveConflicts(p);
        if (conflicts.length > 0) {
          const names = conflicts.map(c => c.player.team).join(', ');
          const hasRegion = conflicts.some(c => c.level === 'region');
          const icon = hasRegion ? '&#9888;' : '&#9670;';
          conflictHtml = `<span class="conflict-preview" title="Would conflict with your ${names}${hasRegion ? ' (same region!)' : ' (same bracket side)'}">${icon}</span>`;
        }
      }

      let rowClass = '';
      if (isMyTeam) rowClass = 'my-team';
      else if (isDrafted) rowClass = 'drafted';

      // Action buttons: contextual
      let actionHtml = '';
      if (isMyTeam) {
        actionHtml = `<button class="we-draft-btn" onclick="toggleMyTeam(${p.rank})" title="Remove from your team"><span class="btn-full">Ours</span><span class="btn-short">Us</span></button>`;
      } else if (isDraftedByOthers) {
        actionHtml = `<button class="draft-btn" onclick="toggleDraft(${p.rank})" title="Undo — mark as available again"><span class="btn-full">Undo</span><span class="btn-short">&#8630;</span></button>`;
      } else {
        actionHtml = `<button class="we-draft-btn" onclick="toggleMyTeam(${p.rank})" title="We drafted this player"><span class="btn-full">Us</span><span class="btn-short">Us</span></button>
          <button class="draft-btn" onclick="toggleDraft(${p.rank})" title="Someone else drafted this player"><span class="btn-full">Draft</span><span class="btn-short">&#128683;</span></button>`;
      }

      return `<tr class="${rowClass}" data-rank="${p.rank}">
        <td class="rank-cell">${p.rank}</td>
        <td class="col-fav" style="text-align:center;"><button class="fav-btn ${favorites.has(p.rank) ? 'active' : ''}" onclick="toggleFav(${p.rank})">&#9733;</button></td>
        <td class="player-cell">${p.player}${isDraftedByOthers ? ` <span class="pick-number">(#${pickIdx + 1})</span>` : ''}${isMyTeam ? '<span class="my-team-badge">OURS</span>' : ''}${conflictHtml}</td>
        <td class="team-cell col-team">${p.team}</td>
        <td class="region-cell col-region">${region}</td>
        <td class="col-seed"><span class="seed-badge ${seedClass(p.seed)}">${p.seed}</span></td>
        <td title="Season average: ${p.ppg.toFixed(1)} points per game">${p.ppg.toFixed(1)}</td>
        <td title="KenPom bracket sim: ${p.team} projected to play ${p.expected_games.toFixed(2)} games">${p.expected_games.toFixed(2)}</td>
        <td class="pts-cell" title="${p.ppg.toFixed(1)} PPG x ${p.expected_games.toFixed(2)} games = ${Math.round(p.projected_points)} pts">${Math.round(p.projected_points)}</td>
        <td title="${p.injury_status || 'HEALTHY'}"><span class="injury-dot ${ic}"></span></td>
        <td style="white-space:nowrap;">${actionHtml}</td>
      </tr>`;
    }).join('');
  }

  updateStats();
  updateDraftLog();
  updateMyTeamPanel();

  // Update sort indicators
  document.querySelectorAll('thead th').forEach(th => {
    const col = th.dataset.sort;
    th.classList.toggle('sorted', col === sortCol);
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = col === sortCol ? (sortAsc ? '\u25B2' : '\u25BC') : '';
  });
}

function toggleFav(rank) {
  if (favorites.has(rank)) favorites.delete(rank);
  else favorites.add(rank);
  saveState();
  render();
}

function toggleDraft(rank) {
  if (drafted.has(rank)) {
    drafted.delete(rank);
    myTeam.delete(rank);
    draftOrder = draftOrder.filter(r => r !== rank);
  } else {
    drafted.add(rank);
    draftOrder.push(rank);
  }
  saveState();
  render();
}

function toggleMyTeam(rank) {
  if (myTeam.has(rank)) {
    myTeam.delete(rank);
    drafted.delete(rank);
    draftOrder = draftOrder.filter(r => r !== rank);
  } else {
    myTeam.add(rank);
    if (!drafted.has(rank)) {
      drafted.add(rank);
      draftOrder.push(rank);
    }
  }
  saveState();
  render();
}

function init() {
  loadState();

  fetch('players.json')
    .then(r => r.json())
    .then(data => {
      players = data;

      const teams = [...new Set(players.map(p => p.team))].sort();
      const teamSelect = document.getElementById('team-filter');
      teams.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        teamSelect.appendChild(opt);
      });

      const seeds = [...new Set(players.map(p => p.seed))].sort((a, b) => a - b);
      const seedSelect = document.getElementById('seed-filter');
      seeds.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = `#${s} Seed`;
        seedSelect.appendChild(opt);
      });

      const regionSelect = document.getElementById('region-filter');
      ['East', 'West', 'South', 'Midwest'].forEach(r => {
        const opt = document.createElement('option');
        opt.value = r;
        opt.textContent = r;
        regionSelect.appendChild(opt);
      });

      render();
    });

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('team-filter').addEventListener('change', render);
  document.getElementById('seed-filter').addEventListener('change', render);
  document.getElementById('region-filter').addEventListener('change', render);

  document.getElementById('hide-drafted').addEventListener('click', function() {
    hideDrafted = !hideDrafted;
    this.classList.toggle('active', hideDrafted);
    this.textContent = hideDrafted ? 'Hide Drafted' : 'Show All';
    render();
  });

  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.sort;
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = col === 'player' || col === 'team' || col === 'region';
      }
      render();
    });
  });

  document.getElementById('show-favs').addEventListener('click', function() {
    showFavsOnly = !showFavsOnly;
    this.classList.toggle('active', showFavsOnly);
    render();
  });

  document.getElementById('clear-filters').addEventListener('click', () => {
    document.getElementById('search').value = '';
    document.getElementById('team-filter').value = '';
    document.getElementById('seed-filter').value = '';
    document.getElementById('region-filter').value = '';
    showFavsOnly = false;
    document.getElementById('show-favs').classList.remove('active');
    sortCol = 'rank';
    sortAsc = true;
    render();
  });

  document.getElementById('undo-btn').addEventListener('click', () => {
    if (draftOrder.length === 0) return;
    const last = draftOrder.pop();
    drafted.delete(last);
    myTeam.delete(last);
    saveState();
    render();
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    if (!confirm('Reset the entire draft? This clears all picks, your team, and favorites.')) return;
    drafted.clear();
    myTeam.clear();
    favorites.clear();
    draftOrder = [];
    showFavsOnly = false;
    document.getElementById('show-favs').classList.remove('active');
    saveState();
    render();
  });

  // Mobile tabs
  document.querySelectorAll('#mobile-tabs button').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#mobile-tabs button').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      const tab = this.dataset.tab;
      document.querySelector('.col-left').classList.toggle('mobile-active', tab === 'my-team');
      document.querySelector('.col-center').classList.toggle('mobile-active', tab === 'board');
      document.querySelector('.col-right').classList.toggle('mobile-active', tab === 'log');
    });
  });

  document.getElementById('export-btn').addEventListener('click', () => {
    const lines = ['Pick,Rank,Player,Team,Region,Seed,PPG,Projected Points,Our Team'];
    draftOrder.forEach((rank, i) => {
      const p = players.find(pl => pl.rank === rank);
      if (p) lines.push(`${i + 1},${p.rank},${p.player},${p.team},${getTeamRegion(p.team) || ''},${p.seed},${p.ppg},${p.projected_points},${myTeam.has(rank) ? 'Yes' : 'No'}`);
    });
    const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'draft_results_2026.csv';
    a.click();
  });
}

init();
</script>
</body>
</html>
