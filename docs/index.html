<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MM 2026 Draft</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MM Draft">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e4e6ed;
    --text-dim: #8b8fa3;
    --accent: #4f8cff;
    --accent-dim: #2a4a8a;
    --green: #34d399;
    --red: #f87171;
    --orange: #fbbf24;
    --purple: #a78bfa;
    --drafted-bg: #1a1d27;
    --drafted-text: #4a4e5e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-text-size-adjust: 100%;
  }

  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #242836 100%);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    padding-top: max(12px, env(safe-area-inset-top));
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    position: -webkit-sticky;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header h1 span { color: var(--accent); }

  .stats-bar {
    display: flex;
    gap: 20px;
    font-size: 13px;
  }

  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-value { font-weight: 700; font-size: 15px; }
  .stat-label { color: var(--text-dim); font-size: 12px; }
  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--orange); }
  .stat-value.purple { color: var(--purple); }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 16px;
    width: 170px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent); }

  select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    color: var(--text);
    font-size: 16px;
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }

  .toggle-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .toggle-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--text);
  }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:hover { background: var(--border); }
  .btn.danger { color: var(--red); }
  .btn.danger:hover { background: rgba(248, 113, 113, 0.15); }

  /* 3-column layout */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr 260px;
    height: calc(100vh - 90px);
    height: calc(100dvh - 90px);
    overflow: hidden;
  }

  .col-left, .col-right {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px;
  }

  .col-right {
    border-right: none;
    border-left: 1px solid var(--border);
  }

  .col-center {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 16px 12px;
  }

  .col-center-sticky {
    position: -webkit-sticky;
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg);
    padding-top: 12px;
    padding-bottom: 4px;
  }

  .col-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .col-left .col-title { color: var(--purple); }
  .col-right .col-title { color: var(--text-dim); }

  /* Best available banner */
  .best-available {
    background: linear-gradient(135deg, rgba(79, 140, 255, 0.08) 0%, rgba(52, 211, 153, 0.06) 100%);
    border: 1px solid var(--accent-dim);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .best-available-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    font-weight: 600;
  }

  .best-available-player {
    font-size: 16px;
    font-weight: 700;
  }

  .best-available-details {
    font-size: 12px;
    color: var(--text-dim);
  }

  .best-available-pts {
    margin-left: auto;
    font-size: 22px;
    font-weight: 800;
    color: var(--green);
  }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  thead th {
    background: var(--bg);
    padding: 8px 8px;
    text-align: left;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    position: -webkit-sticky;
    position: sticky;
    top: 0;
    z-index: 10;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }
  thead th .sort-arrow { margin-left: 3px; font-size: 9px; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  @media (hover: hover) { tbody tr:hover { background: var(--surface2); } }

  tbody td {
    padding: 7px 8px;
    white-space: nowrap;
  }

  tr.drafted {
    background: var(--drafted-bg) !important;
    opacity: 0.35;
  }

  tr.drafted td { text-decoration: line-through; color: var(--drafted-text); }

  tr.my-team {
    background: rgba(167, 139, 250, 0.08) !important;
    opacity: 1;
  }

  tr.my-team td { text-decoration: none; color: var(--text); }

  .rank-cell { font-weight: 700; color: var(--text-dim); width: 28px; padding-right: 2px; }
  .player-cell { font-weight: 600; padding-left: 2px; }
  .team-cell { color: var(--text-dim); }
  .region-cell { font-size: 11px; color: var(--text-dim); }

  .seed-badge {
    display: inline-block;
    background: var(--surface2);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 700;
    min-width: 24px;
    text-align: center;
  }

  .seed-1 { background: rgba(52, 211, 153, 0.2); color: var(--green); }
  .seed-2 { background: rgba(79, 140, 255, 0.2); color: var(--accent); }
  .seed-3 { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
  .seed-4 { background: rgba(251, 191, 36, 0.2); color: var(--orange); }

  .pts-cell {
    font-weight: 800;
    font-size: 13px;
    color: var(--green);
  }

  .pts-penalty {
    font-size: 10px;
    font-weight: 600;
    color: var(--orange);
    margin-left: 2px;
  }

  .pts-adj {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    display: block;
    line-height: 1;
  }

  .fav-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 18px;
    padding: 2px 4px;
    line-height: 1;
    color: #555;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  @media (hover: hover) { .fav-btn:hover { color: var(--orange); } }
  .fav-btn.active { color: var(--orange); }

  /* Focus styles for keyboard navigation */
  .fav-btn:focus-visible, .draft-btn:focus-visible, .we-draft-btn:focus-visible,
  .toggle-btn:focus-visible, .btn:focus-visible, .btn-primary:focus-visible,
  .btn-cancel:focus-visible, .mock-banner button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .draft-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  @media (hover: hover) {
    .draft-btn:hover {
      border-color: var(--red);
      color: var(--red);
      background: rgba(248, 113, 113, 0.1);
    }
  }

  .we-draft-btn {
    background: transparent;
    border: 1px solid rgba(167, 139, 250, 0.3);
    border-radius: 4px;
    padding: 3px 6px;
    color: var(--purple);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 600;
    -webkit-tap-highlight-color: transparent;
  }

  @media (hover: hover) {
    .we-draft-btn:hover {
      border-color: var(--purple);
      background: rgba(167, 139, 250, 0.15);
    }
  }

  tr.drafted .draft-btn {
    border-color: var(--drafted-text);
    color: var(--drafted-text);
    text-decoration: none;
    opacity: 1;
  }

  @media (hover: hover) {
    tr.drafted .draft-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: rgba(52, 211, 153, 0.1);
    }
  }

  tr.my-team .we-draft-btn {
    border-color: var(--purple);
    background: rgba(167, 139, 250, 0.2);
    color: var(--purple);
  }

  .my-team-badge {
    font-size: 9px;
    font-weight: 700;
    color: var(--purple);
    margin-left: 4px;
    text-decoration: none !important;
  }

  /* Conflict icons use inline styles with round-specific colors:
     Red = Round of 64, Orange = Round of 32,
     Yellow = Sweet 16, Green = Elite 8 */

  .insight-diamond {
    color: #60a5fa;
    cursor: help;
    font-size: 12px;
    margin-left: 2px;
    -webkit-tap-highlight-color: transparent;
  }

  .pick-number {
    font-size: 10px;
    color: var(--orange);
    font-weight: 600;
  }

  .injury-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 4px;
  }

  .injury-dot.healthy { background: var(--green); }
  .injury-dot.questionable { background: var(--orange); }
  .injury-dot.out { background: var(--red); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* My Team panel (left column) */
  .my-team-region {
    margin-bottom: 12px;
  }

  .my-team-region-header {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }

  .region-conflict-badge {
    color: var(--orange);
    font-size: 10px;
    font-weight: 600;
  }

  .my-team-player {
    padding: 5px 2px;
    border-bottom: 1px solid rgba(46, 51, 69, 0.4);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .my-team-player-name { font-weight: 600; font-size: 12px; }
  .my-team-player-team { color: var(--text-dim); font-size: 11px; }
  .my-team-player-pts { color: var(--green); font-weight: 700; font-size: 12px; }

  .my-team-player-remove {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    padding: 1px 4px;
    border-radius: 3px;
    margin-left: 4px;
    transition: all 0.15s;
  }

  .my-team-player-remove:hover {
    color: var(--red);
    background: rgba(248, 113, 113, 0.1);
  }

  .my-team-total {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 2px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    font-size: 13px;
  }

  .my-team-total-pts { color: var(--green); }

  .my-team-conflicts {
    margin-bottom: 12px;
    padding: 8px;
    background: rgba(251, 191, 36, 0.08);
    border: 1px solid rgba(251, 191, 36, 0.2);
    border-radius: 6px;
    font-size: 11px;
  }

  .my-team-conflicts-title {
    font-weight: 700;
    color: var(--orange);
    margin-bottom: 4px;
    font-size: 11px;
  }

  .conflict-item {
    padding: 3px 0;
    color: var(--text-dim);
    line-height: 1.3;
  }

  .my-team-empty {
    color: var(--text-dim);
    font-size: 12px;
    padding: 16px 0;
    text-align: center;
    line-height: 1.5;
  }

  /* Draft log (right column) */
  .draft-log-item {
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .draft-log-item .pick-num { color: var(--orange); font-weight: 700; margin-right: 4px; font-size: 11px; }
  .draft-log-item .pick-player { font-weight: 600; font-size: 12px; }
  .draft-log-item .pick-team { color: var(--text-dim); font-size: 11px; }

  /* Mobile tabs */
  .mobile-tabs {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .mobile-tabs button {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 10px 0;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    -webkit-appearance: none;
  }

  .mobile-tabs button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .mobile-tabs button[data-tab="my-team"].active {
    color: var(--purple);
    border-bottom-color: var(--purple);
  }

  @media (max-width: 1200px) {
    .layout {
      grid-template-columns: 240px 1fr 220px;
    }
  }

  @media (max-width: 900px) {
    .mobile-tabs {
      display: flex;
    }
    .layout {
      grid-template-columns: 1fr;
      height: calc(100vh - 130px);
      height: calc(100dvh - 130px);
    }
    .col-left, .col-right, .col-center {
      display: none;
      border: none;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .col-left.mobile-active,
    .col-right.mobile-active,
    .col-center.mobile-active {
      display: block;
    }
    .header {
      padding: 10px 12px;
      padding-top: max(10px, env(safe-area-inset-top));
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
    }
    .stats-bar { gap: 12px; flex-wrap: wrap; }
    .controls { gap: 5px; }
    .search-box { width: 140px; }

    /* Hide columns on mobile to prevent horizontal scrolling */
    .col-team, .col-region, .col-seed { display: none; }
    .col-fav { padding: 0 2px; }
    .fav-btn { font-size: 16px; padding: 4px 2px; }

    /* Compact player names on mobile */
    .player-cell {
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 11px;
    }

    /* Tighten all table cells on mobile */
    tbody td, thead th { padding: 5px 3px; font-size: 11px; }
    .rank-cell { width: 20px; padding-right: 1px; }
    .pts-cell { font-size: 12px; }

    /* Hide sort arrows on mobile */
    .sort-arrow { display: none !important; }

    /* Compact action buttons on mobile */
    .we-draft-btn .btn-full { display: none; }
    .we-draft-btn .btn-short { display: inline; }
    .draft-btn .btn-full { display: none; }
    .draft-btn .btn-short { display: inline; }
  }

  /* Desktop: show full text, hide short text */
  @media (min-width: 901px) {
    .we-draft-btn .btn-short { display: none; }
    .draft-btn .btn-short { display: none; }
  }

  /* Mock Draft Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 340px;
    max-width: 90vw;
  }

  .modal h2 {
    font-size: 16px;
    margin-bottom: 16px;
  }

  .modal label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
    margin-top: 12px;
  }

  .modal input, .modal select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 14px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  .modal-actions button {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
  }

  .modal-actions .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .modal-actions .btn-cancel {
    background: var(--surface2);
    color: var(--text);
  }

  /* Mock Draft Banner */
  .mock-banner {
    display: none;
    background: linear-gradient(135deg, rgba(251, 191, 36, 0.12) 0%, rgba(248, 113, 113, 0.08) 100%);
    border: 1px solid rgba(251, 191, 36, 0.3);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 12px;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }

  .mock-banner.active { display: flex; }

  .mock-banner-info { flex: 1; }
  .mock-banner-round { font-weight: 700; color: var(--orange); }
  .mock-banner-pick { color: var(--text-dim); }
  .mock-banner-status { font-weight: 700; font-size: 14px; }
  .mock-banner-status.your-turn { color: var(--green); }
  .mock-banner-status.waiting { color: var(--text-dim); }

  .mock-banner button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  .mock-banner .btn-stop { color: var(--red); }

  /* Analysis Modal */
  .analysis-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 600px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .analysis-modal h2 {
    font-size: 16px;
    margin-bottom: 4px;
  }

  .analysis-subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .analysis-hero {
    background: linear-gradient(135deg, rgba(52, 211, 153, 0.1) 0%, rgba(79, 140, 255, 0.08) 100%);
    border: 1px solid rgba(52, 211, 153, 0.25);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    text-align: center;
  }

  .analysis-hero-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .analysis-hero-finish {
    font-size: 32px;
    font-weight: 800;
    color: var(--green);
  }

  .analysis-hero-pts {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .analysis-team {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .analysis-team.is-ours {
    border-color: rgba(167, 139, 250, 0.4);
    background: rgba(167, 139, 250, 0.05);
  }

  .analysis-team.is-best {

<script>
let players = [];
let insights = {}; // player name -> insight text
let drafted = new Set();
let myTeam = new Set();
let favorites = new Set();
let draftOrder = [];
let draftConfig = null; // {teams, position, snake, rounds}
let sortCol = 'rank';
let sortAsc = true;
let hideDrafted = true;
let showFavsOnly = false;

let REGIONS = {};

const BRACKET_SIDES = { "East": "A", "West": "A", "South": "B", "Midwest": "B" };

function getTeamRegion(team) {
  for (const [region, teams] of Object.entries(REGIONS)) {
    if (teams.includes(team)) return region;
  }
  // Fallback: check players array directly
  const p = players.find(pl => pl.team === team);
  return p ? p.region || null : null;
}

// Standard 64-team bracket: seed positions in each region
// Seeds that share a "pod" meet in each round:
//   R1 matchups: 1v16, 8v9, 5v12, 4v13, 6v11, 3v14, 7v10, 2v15
//   R2: {1,16,8,9}, {5,12,4,13}, {6,11,3,14}, {7,10,2,15}
//   S16: {1,16,8,9,5,12,4,13}, {6,11,3,14,7,10,2,15}
//   E8: all 16 seeds in region
//   F4: same bracket side (East/West or South/Midwest)
//   Finals: opposite sides
const BRACKET_PODS = {
  1: [1,16,8,9,5,12,4,13,6,11,3,14,7,10,2,15], // just for grouping
};

function getTeamSeed(team) {
  for (const [region, teams] of Object.entries(REGIONS)) {
    const idx = teams.indexOf(team);
    if (idx === -1) continue;
    // Players in REGIONS are stored in bracket order (from bracket.json)
    // We need actual seed. Check players array.
    const p = players.find(pl => pl.team === team);
    return p ? p.seed : null;
  }
  return null;
}

function getEarliestMeetingRound(team1, team2) {
  if (team1 === team2) return null;
  const r1 = getTeamRegion(team1), r2 = getTeamRegion(team2);
  if (!r1 || !r2) return null;

  if (r1 !== r2) {
    if (BRACKET_SIDES[r1] === BRACKET_SIDES[r2]) return 5; // Final Four
    return 6; // Championship
  }

  // Same region — determine round based on seeds
  const s1 = getTeamSeed(team1), s2 = getTeamSeed(team2);
  if (!s1 || !s2) return 4; // fallback: Elite 8

  // R1 matchups: 1v16, 8v9, 5v12, 4v13, 6v11, 3v14, 7v10, 2v15
  // R2 pods: {1,16,8,9}, {5,12,4,13}, {6,11,3,14}, {7,10,2,15}
  // S16 pods: {1,16,8,9,5,12,4,13}, {6,11,3,14,7,10,2,15}
  // E8: whole region

  const r1pods = [[1,16],[8,9],[5,12],[4,13],[6,11],[3,14],[7,10],[2,15]];
  const r2pods = [[1,16,8,9],[5,12,4,13],[6,11,3,14],[7,10,2,15]];
  const s16pods = [[1,16,8,9,5,12,4,13],[6,11,3,14,7,10,2,15]];

  // Check Round 1
  for (const pod of r1pods) {
    if (pod.includes(s1) && pod.includes(s2)) return 1;
  }
  // Check Round 2
  for (const pod of r2pods) {
    if (pod.includes(s1) && pod.includes(s2)) return 2;
  }
  // Check Sweet 16
  for (const pod of s16pods) {
    if (pod.includes(s1) && pod.includes(s2)) return 3;
  }
  // Must be Elite 8
  return 4;
}

function getConflictLevel(team1, team2) {
  const round = getEarliestMeetingRound(team1, team2);
  if (!round || round >= 6) return null; // championship = negligible
  if (round <= 4) return 'region';
  return 'semifinal';
}

function getConflictColor(round) {
  if (round === 1) return 'var(--red)';
  if (round === 2) return 'var(--orange)';
  if (round === 3) return '#eab308'; // yellow
  if (round === 4) return 'var(--green)';
  return 'var(--text-dim)'; // F4+
}

function getConflictLabel(round) {
  const labels = { 1: 'Round of 64', 2: 'Round of 32', 3: 'Sweet 16', 4: 'Elite 8', 5: 'Final Four' };
  return labels[round] || 'Later';
}

// Precomputed map of college team -> total pts on our roster.
// Rebuilt at the start of each render() call.
let _myTeamPtsCache = {};

function rebuildMyTeamPtsCache() {
  _myTeamPtsCache = {};
  for (const rank of myTeam) {
    const p = players.find(pl => pl.rank === rank);
    if (!p) continue;
    _myTeamPtsCache[p.team] = (_myTeamPtsCache[p.team] || 0) + p.projected_points;
  }
}

const _LIVE_ROUND_FACTORS = { 1: 0.35, 2: 0.25, 3: 0.18, 4: 0.12, 5: 0.05 };

function calcLivePenalty(player) {
  if (myTeam.size === 0) return 0;
  let penalty = 0;
  for (const [team, pts] of Object.entries(_myTeamPtsCache)) {
    if (team === player.team) continue;
    const round = getEarliestMeetingRound(player.team, team);
    if (!round || round >= 6) continue;
    const factor = _LIVE_ROUND_FACTORS[round] || 0;
    const weaker = Math.min(player.projected_points, pts);
    penalty += weaker * factor;
  }
  return Math.round(penalty * 10) / 10;
}

function getProspectiveConflicts(player) {
  const conflicts = [];
  for (const rank of myTeam) {
    const other = players.find(p => p.rank === rank);
    if (!other) continue;
    const round = getEarliestMeetingRound(player.team, other.team);
    if (round && round <= 5) {
      conflicts.push({ player: other, round });
    }
  }
  return conflicts;
}

const STORAGE_KEY = 'mm2026_draft';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const state = JSON.parse(saved);
      drafted = new Set(state.drafted || []);
      myTeam = new Set(state.myTeam || []);
      favorites = new Set(state.favorites || []);
      draftOrder = state.draftOrder || [];
      draftConfig = state.draftConfig || null;
    }
  } catch(e) {}
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    drafted: [...drafted],
    myTeam: [...myTeam],
    favorites: [...favorites],
    draftOrder,
    draftConfig
  }));
}

function seedClass(seed) {
  if (seed <= 4) return `seed-${seed}`;
  return '';
}

function injuryClass(status) {
  if (!status) return 'healthy';
  const s = status.toLowerCase();
  if (s.includes('out') || s.includes('season')) return 'out';
  if (s.includes('question') || s.includes('day') || s.includes('return')) return 'questionable';
  return 'healthy';
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const teamFilter = document.getElementById('team-filter').value;
  const seedMin = parseInt(document.getElementById('seed-min').value) || 1;
  const seedMax = parseInt(document.getElementById('seed-max').value) || 16;
  const regionFilter = document.getElementById('region-filter').value;

  let filtered = players.filter(p => {
    if (hideDrafted && drafted.has(p.rank)) return false;
    if (showFavsOnly && !favorites.has(p.rank)) return false;
    if (search && !p.player.toLowerCase().includes(search) && !p.team.toLowerCase().includes(search)) return false;
    if (teamFilter && p.team !== teamFilter) return false;
    if (p.seed < seedMin || p.seed > seedMax) return false;
    if (regionFilter && getTeamRegion(p.team) !== regionFilter) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'region') {
      va = getTeamRegion(a.team) || '';
      vb = getTeamRegion(b.team) || '';
    }
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  return filtered;
}

function getBestAvailable() {
  return players
    .filter(p => !drafted.has(p.rank))
    .sort((a, b) => b.projected_points - a.projected_points)[0];
}

function updateStats() {
  const avail = players.length - drafted.size;
  document.getElementById('available-count').textContent = avail;
  document.getElementById('drafted-count').textContent = drafted.size;
  document.getElementById('my-team-count').textContent = myTeam.size;
  document.getElementById('pick-number').textContent = `Pick ${drafted.size + 1}`;

  const best = getBestAvailable();
  const baDraftBtn = document.getElementById('ba-draft-btn');
  if (best) {
    document.getElementById('ba-player').textContent = best.player;
    document.getElementById('ba-details').textContent = `${best.team} (${best.seed}) | ${best.ppg} PPG | ${best.expected_games} exp. games`;
    document.getElementById('ba-pts').textContent = Math.round(best.projected_points);
    // Show draft button on best available when it's our turn (mock or live)
    const showBtn = (mockActive && isMyMockPick() && !isMockComplete()) || (liveActive && isLiveMyPick() && !isLiveComplete());
    baDraftBtn.style.display = showBtn ? '' : 'none';
  } else {
    document.getElementById('ba-player').textContent = 'All players drafted';
    document.getElementById('ba-details').textContent = '';
    document.getElementById('ba-pts').textContent = '--';
    baDraftBtn.style.display = 'none';
  }
}

function draftBestAvailable() {
  const best = getBestAvailable();
  if (best && ((mockActive && isMyMockPick()) || (liveActive && isLiveMyPick()))) {
    toggleMyTeam(best.rank);
  }
}

function getDraftLogTeams() {
  if (liveActive) return liveConfig.teams;
  if (draftConfig) return draftConfig.teams;
  return 14;
}

function getDraftLogPosition() {
  if (liveActive) return liveConfig.position;
  if (draftConfig) return draftConfig.position;
  return 1;
}

function getSnakeTeam(pickIndex) {
  // Snake draft: round 1 goes 1→N, round 2 goes N→1, etc.
  const numTeams = getDraftLogTeams();
  const round = Math.floor(pickIndex / numTeams);
  const posInRound = pickIndex % numTeams;
  const isEvenRound = round % 2 === 0;
  return isEvenRound ? posInRound + 1 : numTeams - posInRound;
}

function isOurPick(pickIndex) {
  return getSnakeTeam(pickIndex) === getDraftLogPosition();
}


function updateDraftLog() {
  const list = document.getElementById('draft-log-list');
  if (draftOrder.length === 0) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:12px 0;text-align:center;">No picks yet.</div>';
    return;
  }
  const numTeams = getDraftLogTeams();
  list.innerHTML = draftOrder.map((rank, i) => {
    const p = players.find(pl => pl.rank === rank);
    if (!p) return '';
    const isOurs = myTeam.has(rank);
    const teamNum = getSnakeTeam(i);
    const ourPick = isOurPick(i);
    const round = Math.floor(i / numTeams) + 1;
    const teamLabel = ourPick ? '<span style="color:var(--purple);font-weight:700;">You</span>' : `Team ${teamNum}`;
    const logo = p.espn_team_id ? `<img src="https://a.espncdn.com/i/teamlogos/ncaa/500/${p.espn_team_id}.png" alt="" style="width:14px;height:14px;vertical-align:middle;margin-right:3px;">` : '';
    return `<div class="draft-log-item" style="${ourPick ? 'background:rgba(167,139,250,0.08);border-radius:4px;padding:5px 4px;' : ''}">
      <span class="pick-num">#${i + 1}</span>
      <span style="color:var(--text-dim);font-size:10px;">R${round}</span>
      <span class="pick-player">${p.player}</span>${isOurs ? '<span class="my-team-badge">OURS</span>' : ''}
      <button class="my-team-player-remove" onclick="undoPick(${rank})" title="Remove this pick">&times;</button><br>
      <span class="pick-team">${logo}${p.team} (${p.seed}) — ${Math.round(p.projected_points)} pts — ${teamLabel}</span>
    </div>`;
  }).reverse().join('');
}

function updateMyTeamPanel() {
  const content = document.getElementById('my-team-content');

  if (myTeam.size === 0) {
    content.innerHTML = '<div class="my-team-empty">Use "Us" to add players to your team.<br><br>"Them" marks picks by other teams.</div>';
    return;
  }

  const myPlayers = players.filter(p => myTeam.has(p.rank));

  // Group by region
  const byRegion = {};
  for (const p of myPlayers) {
    const region = getTeamRegion(p.team) || 'Unknown';
    if (!byRegion[region]) byRegion[region] = [];
    byRegion[region].push(p);
  }

  // Find all conflicts — aggregate by college team pair
  const ROUND_LABELS = { 1: 'R1 opponents', 2: 'meet in R2', 3: 'meet in Sweet 16', 4: 'meet in Elite 8', 5: 'meet in Final Four' };
  const collegeTeams = [...new Set(myPlayers.map(p => p.team))];
  const teamConflicts = [];
  for (let i = 0; i < collegeTeams.length; i++) {
    for (let j = i + 1; j < collegeTeams.length; j++) {
      const round = getEarliestMeetingRound(collegeTeams[i], collegeTeams[j]);
      if (round && round <= 5) {
        teamConflicts.push({ t1: collegeTeams[i], t2: collegeTeams[j], round, label: ROUND_LABELS[round] });
      }
    }
  }

  let html = '';

  // Conflict warnings at the top
  if (teamConflicts.length > 0) {
    html += `<div class="my-team-conflicts">
      <div class="my-team-conflicts-title">&#9888; Bracket Conflicts</div>`;
    for (const c of teamConflicts) {
      html += `<div class="conflict-item">
        <strong>${c.t1}</strong> vs <strong>${c.t2}</strong> — ${c.label}
      </div>`;
    }
    html += '</div>';
  }

  // Region sections
  for (const region of ['East', 'West', 'South', 'Midwest', 'Unknown']) {
    const rPlayers = byRegion[region];
    if (!rPlayers || rPlayers.length === 0) continue;

    const regionTeams = [...new Set(rPlayers.map(p => p.team))];
    const hasConflict = region !== 'Unknown' && regionTeams.length > 1;

    html += `<div class="my-team-region">
      <div class="my-team-region-header">
        <span>${region}</span>
        ${hasConflict ? `<span class="region-conflict-badge">&#9888; ${regionTeams.length} teams</span>` : ''}
      </div>`;

    for (const p of rPlayers.sort((a, b) => b.projected_points - a.projected_points)) {
      html += `<div class="my-team-player">
        <div>
          <div class="my-team-player-name">${p.player}</div>
          <div class="my-team-player-team">${p.espn_team_id ? `<img src="https://a.espncdn.com/i/teamlogos/ncaa/500/${p.espn_team_id}.png" alt="" style="width:14px;height:14px;vertical-align:middle;margin-right:3px;">` : ''}${p.team} (#${p.seed})</div>
        </div>
        <div style="display:flex;align-items:center;gap:3px;">
          <span class="my-team-player-pts">${Math.round(p.projected_points)}</span>
          <button class="my-team-player-remove" onclick="toggleMyTeam(${p.rank})" title="Remove from team">&times;</button>
        </div>
      </div>`;
    }

    html += '</div>';
  }

  // Total
  const totalPts = myPlayers.reduce((sum, p) => sum + p.projected_points, 0);
  html += `<div class="my-team-total">
    <span>${myPlayers.length} player${myPlayers.length !== 1 ? 's' : ''}</span>
    <span class="my-team-total-pts">${Math.round(totalPts)} pts</span>
  </div>`;

  content.innerHTML = html;
}

function render() {
  rebuildMyTeamPtsCache();
  const filtered = getFiltered();
  const tbody = document.getElementById('table-body');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('no-results').style.display = 'block';
  } else {
    document.getElementById('no-results').style.display = 'none';
    tbody.innerHTML = filtered.map(p => {
      const isDrafted = drafted.has(p.rank);
      const isMyTeam = myTeam.has(p.rank);
      const isDraftedByOthers = isDrafted && !isMyTeam;
      const pickIdx = draftOrder.indexOf(p.rank);
      const ic = injuryClass(p.injury_status);
      const region = getTeamRegion(p.team) || '?';

      // Conflict info — colored by earliest round teams could meet
      let conflictHtml = '';
      if (isMyTeam || (!isDrafted && myTeam.size > 0)) {
        const conflicts = getProspectiveConflicts(p).filter(c => c.player.rank !== p.rank);
        if (conflicts.length > 0) {
          // Use the worst (earliest) conflict for the icon color
          const worst = Math.min(...conflicts.map(c => c.round));
          const color = getConflictColor(worst);
          const details = conflicts.map(c =>
            `${c.player.team}: could meet in ${getConflictLabel(c.round)}`
          ).join('\n');
          const opacity = isMyTeam ? '1' : '0.7';
          conflictHtml = `<span style="color:${color};font-size:11px;margin-left:4px;cursor:help;text-decoration:none !important;opacity:${opacity};" title="${details}">&#9888;</span>`;
        }
      }

      let rowClass = '';
      if (isMyTeam) rowClass = 'my-team';
      else if (isDrafted) rowClass = 'drafted';

      // Action buttons: contextual based on draft mode
      let actionHtml = '';
      const myMockTurn = mockActive && isMyMockPick();
      const myLiveTurn = liveActive && isLiveMyPick() && !isLiveComplete();
      const liveOtherTurn = liveActive && !isLiveMyPick() && !isLiveComplete();

      if (isMyTeam) {
        const canRemove = !mockActive || mockPaused;
        actionHtml = canRemove ? `<button class="we-draft-btn" onclick="toggleMyTeam(${p.rank})" title="Remove from your team"><span class="btn-full">Ours</span><span class="btn-short">Us</span></button>` : `<span class="my-team-badge">OURS</span>`;
      } else if (isDraftedByOthers) {
        actionHtml = (mockActive || liveActive) ? '' : `<button class="draft-btn" onclick="toggleDraft(${p.rank})" title="Undo — mark as available again"><span class="btn-full">Undo</span><span class="btn-short">&#8630;</span></button>`;
      } else if (liveActive && !isLiveComplete()) {
        // Live draft: show only the relevant button based on whose turn it is
        if (myLiveTurn) {
          actionHtml = `<button class="we-draft-btn" onclick="toggleMyTeam(${p.rank})" title="Draft this player for your team"><span class="btn-full">Us</span><span class="btn-short">Us</span></button>`;
        } else {
          actionHtml = `<button class="draft-btn" onclick="toggleDraft(${p.rank})" title="This team drafted this player"><span class="btn-full">Them</span><span class="btn-short">&#128683;</span></button>`;
        }
      } else if (mockActive) {
        if (myMockTurn) {
          actionHtml = `<button class="we-draft-btn" onclick="toggleMyTeam(${p.rank})" title="Draft this player for your team"><span class="btn-full">Us</span><span class="btn-short">Us</span></button>`;
        } else {
          actionHtml = `<button class="we-draft-btn" disabled style="opacity:0.25;cursor:default;" title="Wait for your pick"><span class="btn-full">Us</span><span class="btn-short">Us</span></button>`;
        }
      } else {
        actionHtml = `<button class="we-draft-btn" onclick="toggleMyTeam(${p.rank})" title="We drafted this player"><span class="btn-full">Us</span><span class="btn-short">Us</span></button>
          <button class="draft-btn" onclick="toggleDraft(${p.rank})" title="Someone else drafted this player"><span class="btn-full">Them</span><span class="btn-short">&#128683;</span></button>`;
      }

      return `<tr class="${rowClass}" data-rank="${p.rank}">
        <td class="rank-cell">${p.rank}</td>
        <td class="col-fav" style="text-align:center;"><button class="fav-btn ${favorites.has(p.rank) ? 'active' : ''}" onclick="toggleFav(${p.rank})" aria-label="${favorites.has(p.rank) ? 'Remove' : 'Add'} ${p.player} ${favorites.has(p.rank) ? 'from' : 'to'} favorites">&#9733;</button></td>
        <td class="player-cell">${p.player}${insights[p.player] ? ` <span class="insight-diamond" title="${insights[p.player].replace(/"/g, '&quot;')}" onclick="alert('${p.player.replace(/'/g, "\\'")}:\\n\\n' + insights['${p.player.replace(/'/g, "\\'")}'])">&#9670;</span>` : ''}${isDraftedByOthers ? ` <span class="pick-number">(#${pickIdx + 1})</span>` : ''}${isMyTeam ? '<span class="my-team-badge">OURS</span>' : ''}${conflictHtml}</td>
        <td class="team-cell col-team">${p.espn_team_id ? `<img src="https://a.espncdn.com/i/teamlogos/ncaa/500/${p.espn_team_id}.png" alt="" style="width:18px;height:18px;vertical-align:middle;margin-right:4px;">` : ''}${p.team}</td>
        <td class="region-cell col-region">${region}</td>
        <td class="col-seed"><span class="seed-badge ${seedClass(p.seed)}">${p.seed}</span></td>
        <td title="${p.recent_ppg ? 'Blended: 60% season (' + p.season_ppg.toFixed(1) + ') + 40% last 5 (' + p.recent_ppg.toFixed(1) + ')' : 'Season average: ' + p.ppg.toFixed(1) + ' points per game'}">${p.ppg.toFixed(1)}</td>
        <td title="KenPom bracket sim: ${p.team} projected to play ${p.expected_games.toFixed(2)} games">${p.expected_games.toFixed(2)}</td>
        <td class="pts-cell" title="${(() => {
          const base = p.ppg * p.expected_games;
          const adj = p.projected_points;
          const injMult = p.injury_status === 'OUT' ? 0 : p.injury_status === 'DAY-TO-DAY' ? 0.7 : p.injury_status === 'PROBABLE' ? 0.9 : p.injury_status === 'RETURNING' ? 0.8 : 1.0;
          const factors = [];
          if (p.ppg >= 20) factors.push('+8% star surge');
          else if (p.ppg >= 15) factors.push('+4% starter surge');
          factors.push('pace-adjusted per matchup');
          factors.push('opponent defense adjusted');
          if (p.seed <= 4) factors.push('blowout minutes reduction');
          if (injMult < 1.0) factors.push(p.injury_status + ' (' + (injMult*100).toFixed(0) + '%)');
          return 'Projected: ' + Math.round(adj) + ' pts\nBase: ' + p.ppg.toFixed(1) + ' PPG × ' + p.expected_games.toFixed(2) + ' games = ' + Math.round(base) + '\nAdjusted for: ' + factors.join(', ');
        })()}">${Math.round(p.projected_points)}${(() => {
          if (isDrafted || myTeam.size === 0) return '';
          const pen = calcLivePenalty(p);
          if (pen <= 0) return '';
          const adj = Math.round(p.projected_points - pen);
          return `<span class="pts-penalty" title="Conflict penalty with your team: -${pen} pts">-${pen}</span><span class="pts-adj">${adj} eff.</span>`;
        })()}</td>
        <td title="${p.injury_status || 'HEALTHY'}"><span class="injury-dot ${ic}"></span></td>
        <td style="white-space:nowrap;">${actionHtml}</td>
      </tr>`;
    }).join('');
  }

  updateStats();
  updateDraftLog();
  updateMyTeamPanel();

  // Update sort indicators
  document.querySelectorAll('thead th').forEach(th => {
    const col = th.dataset.sort;
    th.classList.toggle('sorted', col === sortCol);
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = col === sortCol ? (sortAsc ? '\u25B2' : '\u25BC') : '';
  });

  // Pin thead below the sticky banner
  const stickyBanner = document.querySelector('.col-center-sticky');
  if (stickyBanner) {
    const h = stickyBanner.offsetHeight;
    document.querySelectorAll('thead th').forEach(th => th.style.top = h + 'px');
  }
}

function toggleFav(rank) {
  if (favorites.has(rank)) favorites.delete(rank);
  else favorites.add(rank);
  saveState();
  render();
}

function undoPick(rank) {
  if (liveActive) return; // No undo during live draft
  drafted.delete(rank);
  myTeam.delete(rank);
  draftOrder = draftOrder.filter(r => r !== rank);
  saveState();
  render();
}

function toggleDraft(rank) {
  if (drafted.has(rank)) {
    if (liveActive) return; // No undo during live draft
    drafted.delete(rank);
    myTeam.delete(rank);
    draftOrder = draftOrder.filter(r => r !== rank);
  } else {
    drafted.add(rank);
    draftOrder.push(rank);
  }
  saveState();
  if (liveActive) updateLiveBanner();
  render();
}

function toggleMyTeam(rank) {
  if (myTeam.has(rank)) {
    if (liveActive) return; // No undo during live draft
    myTeam.delete(rank);
    drafted.delete(rank);
    draftOrder = draftOrder.filter(r => r !== rank);
  } else {
    myTeam.add(rank);
    if (!drafted.has(rank)) {
      drafted.add(rank);
      draftOrder.push(rank);
    }
  }
  saveState();
  if (liveActive) updateLiveBanner();
  render();
}

function init() {
  loadState();

  // Load player data and insights in parallel, render when both ready
  const insightsPromise = fetch('insights.json').then(r => r.ok ? r.json() : {}).catch(() => ({}));

  Promise.all([
    fetch('players.json').then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }),
    insightsPromise
  ]).then(([data, insightsData]) => {
    insights = insightsData || {};
      // Support both new {generated_at, players} and legacy flat-array format
      if (Array.isArray(data)) {
        players = data;
      } else {
        players = data.players || [];
        if (data.generated_at) {
          const ts = document.getElementById('generated-ts');
          if (ts) {
            const d = new Date(data.generated_at);
            ts.textContent = `Updated ${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
            ts.title = data.generated_at;
          }
        }
      }

      // Build REGIONS from player data
      REGIONS = {};
      for (const p of players) {
        if (p.region) {
          if (!REGIONS[p.region]) REGIONS[p.region] = [];
          if (!REGIONS[p.region].includes(p.team)) REGIONS[p.region].push(p.team);
        }
      }

      const teams = [...new Set(players.map(p => p.team))].sort();
      const teamSelect = document.getElementById('team-filter');
      teams.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        teamSelect.appendChild(opt);
      });

      // Seed range filter is static HTML (1-16), no dynamic population needed

      const regionSelect = document.getElementById('region-filter');
      Object.keys(REGIONS).sort().forEach(r => {
        const opt = document.createElement('option');
        opt.value = r;
        opt.textContent = r;
        regionSelect.appendChild(opt);
      });

      render();
    })
    .catch(err => {
      document.getElementById('no-results').style.display = 'block';
      document.getElementById('no-results').textContent = `Failed to load player data: ${err.message}. Make sure players.json is deployed.`;
    });

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('team-filter').addEventListener('change', render);
  document.getElementById('seed-min').addEventListener('change', render);
  document.getElementById('seed-max').addEventListener('change', render);
  document.getElementById('region-filter').addEventListener('change', render);

  document.getElementById('hide-drafted').addEventListener('click', function() {
    hideDrafted = !hideDrafted;
    this.classList.toggle('active', hideDrafted);
    this.textContent = hideDrafted ? 'Hide Drafted' : 'Show All';
    render();
  });

  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.sort;
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = col === 'player' || col === 'team' || col === 'region';
      }
      render();
    });
  });

  document.getElementById('show-favs').addEventListener('click', function() {
    showFavsOnly = !showFavsOnly;
    this.classList.toggle('active', showFavsOnly);
    render();
  });


  document.getElementById('reset-btn').addEventListener('click', () => {
    if (!confirm('Reset the entire draft? This clears all picks, your team, and favorites.')) return;
    drafted.clear();
    myTeam.clear();
    favorites.clear();
    draftOrder = [];
    draftConfig = null;
    showFavsOnly = false;
    document.getElementById('show-favs').classList.remove('active');
    saveState();
    render();
  });

  // Mobile tabs
  document.querySelectorAll('#mobile-tabs button').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#mobile-tabs button').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      const tab = this.dataset.tab;
      document.querySelector('.col-left').classList.toggle('mobile-active', tab === 'my-team');
      document.querySelector('.col-center').classList.toggle('mobile-active', tab === 'board');
      document.querySelector('.col-right').classList.toggle('mobile-active', tab === 'log');
    });
  });

  document.getElementById('export-btn').addEventListener('click', () => {
    const lines = ['Pick,Round,Draft Team,Rank,Player,Team,Region,Seed,PPG,Projected Points,Our Team'];
    draftOrder.forEach((rank, i) => {
      const p = players.find(pl => pl.rank === rank);
      if (!p) return;
      const teamNum = getSnakeTeam(i);
      const round = Math.floor(i / getDraftLogTeams()) + 1;
      const isOurs = myTeam.has(rank) ? 'Yes' : 'No';
      lines.push(`${i + 1},${round},${teamNum},${p.rank},${p.player},${p.team},${getTeamRegion(p.team) || ''},${p.seed},${p.ppg},${p.projected_points},${isOurs}`);
    });
    const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'draft_results_2026.csv';
    a.click();
  });

  document.getElementById('export-all-btn').addEventListener('click', () => {
    const lines = ['Rank,Player,Team,Region,Seed,PPG,Expected Games,Projected Points,Status,Drafted,Our Team'];
    players.forEach(p => {
      const status = drafted.has(p.rank) ? (myTeam.has(p.rank) ? 'Our Pick' : 'Drafted') : 'Available';
      lines.push(`${p.rank},"${p.player}",${p.team},${getTeamRegion(p.team) || ''},${p.seed},${p.ppg},${p.expected_games},${p.projected_points},${p.injury_status},${status},${myTeam.has(p.rank) ? 'Yes' : 'No'}`);
    });
    const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'all_projections_2026.csv';
    a.click();
  });

  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    // Ignore if typing in search box
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      e.preventDefault();
      if (mockActive) return; // Don't undo during mock draft — would desync pick counter
      if (draftOrder.length === 0) return;
      const last = draftOrder.pop();
      drafted.delete(last);
      myTeam.delete(last);
      saveState();
      render();
    }
    if (e.key === '/' || (e.key === 'f' && (e.ctrlKey || e.metaKey))) {
      e.preventDefault();
      document.getElementById('search').focus();
    }
    if (e.key === 'Escape') {
      // Close any open modal
      for (const id of ['analysis-modal', 'mock-modal']) {
        const modal = document.getElementById(id);
        if (modal && modal.classList.contains('open')) {
          modal.classList.remove('open');
          return;
        }
      }
      document.getElementById('search').blur();
      document.getElementById('search').value = '';
      render();
    }
  });
}

// === Mock Draft ===
let mockActive = false;
let mockPaused = false;
let mockTimer = null;
let mockConfig = { teams: 20, position: 1, snake: true, speed: 1000, rounds: 14 };
let mockPickIndex = 0;

function getMockTotalPicks() {
  return mockConfig.teams * mockConfig.rounds;
}

function getMockCurrentTeam() {
  const { teams, snake } = mockConfig;
  const round = Math.floor(mockPickIndex / teams);
  const posInRound = mockPickIndex % teams;
  if (snake && round % 2 === 1) {
    return teams - posInRound;
  }
  return posInRound + 1;
}

function getMockRound() {
  return Math.floor(mockPickIndex / mockConfig.teams) + 1;
}

function getMockPickInRound() {
  return (mockPickIndex % mockConfig.teams) + 1;
}

function isMyMockPick() {
  return getMockCurrentTeam() === mockConfig.position;
}

function isMockComplete() {
  return mockPickIndex >= getMockTotalPicks();
}

function updateMockBanner() {
  const banner = document.getElementById('mock-banner');
  const roundEl = document.getElementById('mock-round');
  const pickEl = document.getElementById('mock-pick');
  const statusEl = document.getElementById('mock-status');
  const pauseBtn = document.getElementById('mock-pause');

  if (!mockActive) {
    banner.classList.remove('active');
    return;
  }

  banner.classList.add('active');

  if (isMockComplete()) {
    roundEl.textContent = 'Draft Complete';
    pickEl.textContent = `${getMockTotalPicks()} picks | ${myTeam.size} on your team`;
    statusEl.innerHTML = '<a href="#" onclick="showAnalysis();return false;" style="color:var(--green);text-decoration:underline;font-weight:700;">View Analysis</a>';
    pauseBtn.style.display = 'none';
    return;
  }

  pauseBtn.style.display = '';
  roundEl.textContent = `Round ${getMockRound()} of ${mockConfig.rounds}`;
  pickEl.textContent = `Pick ${getMockPickInRound()} of ${mockConfig.teams} (Team #${getMockCurrentTeam()})`;

  if (isMyMockPick()) {
    statusEl.textContent = 'YOUR PICK!';
    statusEl.className = 'mock-banner-status your-turn';
  } else if (mockPaused) {
    statusEl.textContent = 'Paused';
    statusEl.className = 'mock-banner-status waiting';
  } else {
    statusEl.textContent = 'Auto-picking...';
    statusEl.className = 'mock-banner-status waiting';
  }

  pauseBtn.textContent = mockPaused ? 'Resume' : 'Pause';
}

function mockSmartPick() {
  const available = players
    .filter(p => !drafted.has(p.rank) && p.projected_points > 0)
    .sort((a, b) => b.projected_points - a.projected_points);

  if (available.length === 0) return null;

  const round = getMockRound();
  const totalRounds = mockConfig.rounds;
  // Progress from 0 (round 1) to 1 (final round)
  const progress = Math.min(1, (round - 1) / Math.max(1, totalRounds - 1));

  // Pool grows: 3 in round 1 → up to 25+ in final rounds
  const poolSize = Math.min(available.length, Math.round(3 + progress * 22));
  const pool = available.slice(0, poolSize);

  // Exponent shrinks as draft progresses:
  //   Round 1: exp=3 (very top-heavy, almost always best available)
  //   Mid:     exp=1.5 (moderate variance)
  //   Late:    exp=0.5 (nearly flat — wild reaches)
  const exp = 3 - progress * 2.5;

  const weights = pool.map(p => Math.pow(p.projected_points, exp));
  const totalWeight = weights.reduce((a, b) => a + b, 0);
  let roll = Math.random() * totalWeight;
  for (let i = 0; i < pool.length; i++) {
    roll -= weights[i];
    if (roll <= 0) return pool[i];
  }
  return pool[0];
}

function mockAutoPick() {
  if (isMockComplete()) { updateMockBanner(); return; }
  const pick = mockSmartPick();
  if (!pick) { stopMockDraft(); return; }
  drafted.add(pick.rank);
  draftOrder.push(pick.rank);
  mockPickIndex++;
  saveState();
  render();
  updateMockBanner();
  scheduleMockNext();
}

function mockUserPicked() {
  mockPickIndex++;
  updateMockBanner();
  scheduleMockNext();
}

function scheduleMockNext() {
  clearTimeout(mockTimer);
  if (!mockActive || mockPaused) return;
  if (isMockComplete()) {
    updateMockBanner();
    // Auto-show analysis after a short delay so user sees the last pick
    setTimeout(() => showAnalysis(), 600);
    return;
  }

  const best = getBestAvailable();
  if (!best) { stopMockDraft(); return; }

  if (isMyMockPick()) {
    updateMockBanner();
    return;
  }

  mockTimer = setTimeout(mockAutoPick, mockConfig.speed);
}

function startMockDraft() {
  const teams = parseInt(document.getElementById('mock-teams').value) || 14;
  const rounds = parseInt(document.getElementById('mock-rounds').value) || 14;
  const position = parseInt(document.getElementById('mock-position').value) || 1;
  const type = document.getElementById('mock-type').value;
  const speed = parseInt(document.getElementById('mock-speed').value) || 1000;

  if (position < 1 || position > teams) {
    alert(`Position must be between 1 and ${teams}`);
    return;
  }

  drafted.clear();
  myTeam.clear();
  draftOrder = [];
  mockPickIndex = 0;
  saveState();

  mockConfig = { teams, position, snake: type === 'snake', speed, rounds };
  draftConfig = { teams, position, snake: type === 'snake', rounds };
  mockActive = true;
  mockPaused = false;
  saveState();

  document.getElementById('mock-modal').classList.remove('open');

  hideDrafted = true;
  document.getElementById('hide-drafted').classList.add('active');
  document.getElementById('hide-drafted').textContent = 'Hide Drafted';

  render();
  updateMockBanner();
  scheduleMockNext();
}

function stopMockDraft() {
  mockActive = false;
  mockPaused = false;
  clearTimeout(mockTimer);
  updateMockBanner();

  hideDrafted = true;
  document.getElementById('hide-drafted').classList.add('active');
  document.getElementById('hide-drafted').textContent = 'Hide Drafted';
  render();
}

// Patch toggleMyTeam to advance mock draft when user picks
const _origToggleMyTeam = toggleMyTeam;
toggleMyTeam = function(rank) {
  const wasOnTeam = myTeam.has(rank);
  _origToggleMyTeam(rank);
  if (mockActive && !wasOnTeam && myTeam.has(rank)) {
    mockUserPicked();
  }
};

// Patch toggleDraft — during mock, if it's your turn, treat "Draft" as a skip (other team took them)
const _origToggleDraft = toggleDraft;
toggleDraft = function(rank) {
  const wasDrafted = drafted.has(rank);
  _origToggleDraft(rank);
  if (mockActive && !wasDrafted && drafted.has(rank) && isMyMockPick()) {
    mockPickIndex++;
    updateMockBanner();
    scheduleMockNext();
  }
};

init();

// Mock draft button
document.getElementById('mock-btn').addEventListener('click', () => {
  if (mockActive) {
    if (confirm('Stop the current mock draft?')) stopMockDraft();
    return;
  }
  document.getElementById('mock-modal').classList.add('open');
});

// Pause/resume
document.getElementById('mock-pause').addEventListener('click', () => {
  if (!mockActive) return;
  mockPaused = !mockPaused;
  updateMockBanner();
  if (!mockPaused) scheduleMockNext();
});

// Stop — handled in live draft section below

// === Live Draft ===
let liveActive = false;
let liveConfig = { teams: 14, position: 1, rounds: 14 };

function getLiveTotalPicks() { return liveConfig.teams * liveConfig.rounds; }

function getLiveCurrentTeam() {
  const { teams } = liveConfig;
  const round = Math.floor(draftOrder.length / teams);
  const pos = draftOrder.length % teams;
  return round % 2 === 0 ? pos + 1 : teams - pos;
}

function isLiveMyPick() { return getLiveCurrentTeam() === liveConfig.position; }
function isLiveComplete() { return draftOrder.length >= getLiveTotalPicks(); }

function startLiveDraft() {
  const teams = parseInt(document.getElementById('live-teams').value) || 14;
  const rounds = parseInt(document.getElementById('live-rounds').value) || 14;
  const position = parseInt(document.getElementById('live-position').value) || 1;

  if (position < 1 || position > teams) {
    alert('Position must be between 1 and ' + teams);
    return;
  }

  drafted.clear();
  myTeam.clear();
  draftOrder = [];
  saveState();

  liveConfig = { teams, position, rounds };
  draftConfig = { teams, position, snake: true, rounds };
  liveActive = true;

  document.getElementById('live-draft-modal').classList.remove('open');

  hideDrafted = true;
  document.getElementById('hide-drafted').classList.add('active');
  document.getElementById('hide-drafted').textContent = 'Hide Drafted';

  render();
  updateLiveBanner();
}

function stopLiveDraft() {
  liveActive = false;
  updateLiveBanner();
  render();
}

function updateLiveBanner() {
  const banner = document.getElementById('mock-banner');
  if (!liveActive) {
    banner.classList.remove('active');
    return;
  }
  banner.classList.add('active');

  const round = Math.floor(draftOrder.length / liveConfig.teams) + 1;
  const pickInRound = (draftOrder.length % liveConfig.teams) + 1;

  document.getElementById('mock-round').textContent = 'Round ' + round;
  document.getElementById('mock-pick').textContent = 'Pick ' + pickInRound + ' of ' + liveConfig.teams;

  if (isLiveComplete()) {
    document.getElementById('mock-status').textContent = 'Draft Complete!';
    document.getElementById('mock-status').className = 'mock-banner-status your-turn';
    document.getElementById('mock-pause').style.display = 'none';
    // Show summary after brief delay
    setTimeout(showDraftSummary, 500);
  } else if (isLiveMyPick()) {
    document.getElementById('mock-status').textContent = 'YOUR PICK!';
    document.getElementById('mock-status').className = 'mock-banner-status your-turn';
  } else {
    document.getElementById('mock-status').textContent = 'Team ' + getLiveCurrentTeam() + ' is picking...';
    document.getElementById('mock-status').className = 'mock-banner-status waiting';
  }

  document.getElementById('mock-pause').style.display = 'none';
  document.getElementById('mock-stop').textContent = isLiveComplete() ? 'Summary' : 'Stop';
}

function showDraftSummary() {
  const myPlayers = players.filter(p => myTeam.has(p.rank));
  if (myPlayers.length === 0) return;

  const totalPts = myPlayers.reduce((s, p) => s + p.projected_points, 0);

  // Group by college team
  const byTeam = {};
  for (const p of myPlayers) {
    if (!byTeam[p.team]) byTeam[p.team] = { pts: 0, players: [], espn_id: p.espn_team_id };
    byTeam[p.team].pts += p.projected_points;
    byTeam[p.team].players.push(p);
  }

  // Sort by pts descending
  const teamList = Object.entries(byTeam).sort((a, b) => b[1].pts - a[1].pts);

  let html = '<h2>Draft Summary</h2>';
  html += '<div class="analysis-subtitle">Your team: ' + myPlayers.length + ' players, ' + Math.round(totalPts) + ' projected points</div>';

  // Logo cloud — sized by point share
  html += '<div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:12px;padding:20px 0;">';
  for (const [team, data] of teamList) {
    const share = data.pts / totalPts;
    const minSize = 32;
    const maxSize = 120;
    const size = Math.round(minSize + share * (maxSize - minSize) * 4); // scale up
    const clampedSize = Math.min(maxSize, Math.max(minSize, size));
    if (data.espn_id) {
      html += '<div style="text-align:center;" title="' + team + ': ' + Math.round(data.pts) + ' pts (' + Math.round(share * 100) + '%)">';
      html += '<img src="https://a.espncdn.com/i/teamlogos/ncaa/500/' + data.espn_id + '.png" style="width:' + clampedSize + 'px;height:' + clampedSize + 'px;">';
      html += '<div style="font-size:10px;color:var(--text-dim);margin-top:2px;">' + Math.round(share * 100) + '%</div>';
      html += '</div>';
    }
  }
  html += '</div>';

  // Player list by team
  html += '<div style="margin-top:16px;">';
  for (const [team, data] of teamList) {
    const share = data.pts / totalPts;
    const logo = data.espn_id ? '<img src="https://a.espncdn.com/i/teamlogos/ncaa/500/' + data.espn_id + '.png" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;">' : '';
    html += '<div style="border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:6px;">';
    html += '<div style="font-weight:700;font-size:13px;">' + logo + team + ' <span style="color:var(--green);margin-left:8px;">' + Math.round(data.pts) + ' pts (' + Math.round(share * 100) + '%)</span></div>';
    for (const p of data.players.sort((a, b) => b.projected_points - a.projected_points)) {
      html += '<div style="font-size:12px;color:var(--text-dim);padding:2px 0 2px 26px;">' + p.player + ' — ' + Math.round(p.projected_points) + ' pts</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  html += '<div class="modal-actions" style="margin-top:16px;"><button class="btn-cancel" onclick="document.getElementById(\'draft-summary-modal\').classList.remove(\'open\')">Close</button></div>';

  document.getElementById('draft-summary-content').innerHTML = html;
  document.getElementById('draft-summary-modal').classList.add('open');
}

document.getElementById('live-draft-btn').addEventListener('click', () => {
  document.getElementById('live-draft-modal').classList.add('open');
});

document.getElementById('mock-stop').addEventListener('click', () => {
  if (liveActive && isLiveComplete()) {
    showDraftSummary();
    return;
  }
  if (liveActive) {
    stopLiveDraft();
    return;
  }
  stopMockDraft();
});

// === Draft Analysis ===

function getTeamForPick(pickIndex, config) {
  const { teams, snake } = config;
  const round = Math.floor(pickIndex / teams);
  const posInRound = pickIndex % teams;
  if (snake && round % 2 === 1) {
    return teams - posInRound; // 1-indexed, reversed
  }
  return posInRound + 1; // 1-indexed
}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function calcConflictPenalty(roster) {
  // Compute conflict penalties at the TEAM-PAIR level, not player-pair level.
  //
  // When two college teams you own players on could meet in the bracket,
  // one eliminates the other — so you lose the loser's remaining production.
  //
  // The penalty for a team pair is:
  //   min(teamA_total_pts, teamB_total_pts) × round_factor
  //
  // Round factors (based on earliest meeting round):
  //   R1 (direct opponents):     35% — almost certain to meet
  //   R2 (same quarter-pod):     25% — both need 1 win first
  //   Sweet 16 (same half):      18% — both need 2 wins
  //   Elite 8 (same region):     12% — both need 3 wins
  //   Final Four (same side):     5% — both need to win their region
  //
  // Penalty uses the weaker TEAM's total points on your roster,
  // since that's the production you lose when that team is eliminated.
  const ROUND_FACTORS = { 1: 0.35, 2: 0.25, 3: 0.18, 4: 0.12, 5: 0.05 };
  const ROUND_LABELS = { 1: 'R1 opponents', 2: 'meet in R2', 3: 'meet in Sweet 16', 4: 'meet in Elite 8', 5: 'meet in Final Four' };

  // Group roster points by college team
  const teamPts = {};
  for (const p of roster) {
    teamPts[p.collegeteam] = (teamPts[p.collegeteam] || 0) + p.pts;
  }

  // Check each unique college team pair
  const collegeTeams = Object.keys(teamPts);
  let penalty = 0;
  const conflicts = [];

  for (let i = 0; i < collegeTeams.length; i++) {
    for (let j = i + 1; j < collegeTeams.length; j++) {
      const t1 = collegeTeams[i], t2 = collegeTeams[j];
      const round = getEarliestMeetingRound(t1, t2);
      if (!round || round >= 6) continue; // championship = negligible

      const factor = ROUND_FACTORS[round] || 0;
      const weaker = Math.min(teamPts[t1], teamPts[t2]);
      const cost = Math.round(weaker * factor * 10) / 10;
      penalty += cost;
      conflicts.push({ t1, t2, round, label: ROUND_LABELS[round], cost });
    }
  }

  conflicts.sort((a, b) => b.cost - a.cost);
  return { penalty: Math.round(penalty), conflicts };
}

function buildAnalysis(config) {
  // Assign each pick in draftOrder to a team
  const teamRosters = {};
  for (let i = 0; i < draftOrder.length; i++) {
    const teamNum = getTeamForPick(i, config);
    const rank = draftOrder[i];
    const p = players.find(pl => pl.rank === rank);
    if (!p) continue;
    if (!teamRosters[teamNum]) teamRosters[teamNum] = [];
    teamRosters[teamNum].push({
      player: p.player,
      collegeteam: p.team,
      seed: p.seed,
      pts: p.projected_points,
      rank: p.rank,
      region: getTeamRegion(p.team)
    });
  }

  // Score each team with conflict adjustment
  const teamScores = [];
  for (let t = 1; t <= config.teams; t++) {
    const roster = teamRosters[t] || [];
    const rawPts = Math.round(roster.reduce((sum, p) => sum + p.pts, 0));
    const { penalty, conflicts } = calcConflictPenalty(roster);
    teamScores.push({
      teamNum: t,
      isOurs: t === config.position,
      roster,
      rawPts,
      penalty,
      adjPts: rawPts - penalty,
      conflicts,
    });
  }

  teamScores.sort((a, b) => b.adjPts - a.adjPts);
  teamScores.forEach((t, i) => t.finish = i + 1);

  return teamScores;
}

function showAnalysis() {
  const modal = document.getElementById('analysis-modal');
  const content = document.getElementById('analysis-content');

  if (draftOrder.length === 0) {
    content.innerHTML = `
      <h2>Draft Analysis</h2>
      <div class="analysis-no-config">No picks have been made yet.<br>Run a draft first, then come back here.</div>
      <div class="modal-actions" style="margin-top:16px;">
        <button class="btn-cancel" onclick="document.getElementById('analysis-modal').classList.remove('open')">Close</button>
      </div>`;
    modal.classList.add('open');
    return;
  }

  // If no config, prompt for setup
  if (!draftConfig) {
    content.innerHTML = `
      <h2>Draft Analysis</h2>
      <div class="analysis-no-config">Set up your draft format so we can assign picks to teams.</div>
      <div class="analysis-setup-form">
        <label>Number of Teams</label>
        <input type="number" id="analysis-teams" value="20" min="2" max="30">
        <label>Your Draft Position</label>
        <input type="number" id="analysis-position" value="1" min="1" max="30">
        <label>Draft Type</label>
        <select id="analysis-type">
          <option value="snake">Snake Draft</option>
          <option value="linear">Linear Draft</option>
        </select>
      </div>
      <div class="modal-actions" style="margin-top:16px;">
        <button class="btn-cancel" onclick="document.getElementById('analysis-modal').classList.remove('open')">Cancel</button>
        <button class="btn-primary" onclick="applyAnalysisConfig()">Analyze</button>
      </div>`;
    modal.classList.add('open');
    return;
  }

  renderAnalysis(draftConfig);
  modal.classList.add('open');
}

function applyAnalysisConfig() {
  const teams = parseInt(document.getElementById('analysis-teams').value) || 20;
  const position = parseInt(document.getElementById('analysis-position').value) || 1;
  const type = document.getElementById('analysis-type').value;
  if (position < 1 || position > teams) {
    alert(`Position must be between 1 and ${teams}`);
    return;
  }
  const rounds = Math.ceil(draftOrder.length / teams);
  draftConfig = { teams, position, snake: type === 'snake', rounds };
  saveState();
  renderAnalysis(draftConfig);
}

function renderAnalysis(config) {
  const content = document.getElementById('analysis-content');
  const teamScores = buildAnalysis(config);

  const ours = teamScores.find(t => t.isOurs);
  const best = teamScores[0];

  let html = `<h2>Draft Analysis</h2>
    <div class="analysis-subtitle">${draftOrder.length} picks across ${config.teams} teams (${config.snake ? 'snake' : 'linear'} draft)</div>`;

  // Hero: our finish
  if (ours) {
    const penaltyNote = ours.penalty > 0
      ? ` &middot; <span style="color:var(--orange);">-${ours.penalty} conflict</span>`
      : ' &middot; <span style="color:var(--green);">no conflicts</span>';
    html += `<div class="analysis-hero">
      <div class="analysis-hero-label">Your Team — Projected Finish</div>
      <div class="analysis-hero-finish">${ordinal(ours.finish)}</div>
      <div class="analysis-hero-pts">${ours.adjPts} adj. pts ${penaltyNote} &middot; ${ours.roster.length} players</div>
    </div>`;

    // Show our conflicts detail
    if (ours.conflicts.length > 0) {
      html += `<div style="background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;">
        <div style="font-weight:700;color:var(--orange);margin-bottom:6px;">Your Bracket Conflicts</div>`;
      for (const c of ours.conflicts) {
        html += `<div style="padding:3px 0;color:var(--text-dim);">
          <strong>${c.t1}</strong> vs <strong>${c.t2}</strong> — ${c.label} <span style="color:var(--orange);">-${c.cost} pts</span>
        </div>`;
      }
      html += '</div>';
    }
  }

  // Best team callout (if not us)
  if (best && !best.isOurs) {
    html += `<div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;padding:0 4px;">
      Best projected team: <strong>Team #${best.teamNum}</strong> with ${best.adjPts} adj. pts
    </div>`;
  }

  // All teams ranked
  html += '<div>';
  for (const t of teamScores) {
    const classes = ['analysis-team'];
    if (t.isOurs) classes.push('is-ours');
    if (t.finish === 1) classes.push('is-best');

    let badges = '';
    if (t.isOurs) badges += '<span class="analysis-team-badge badge-ours">Your Team</span>';
    if (t.finish === 1) badges += '<span class="analysis-team-badge badge-best">Best</span>';

    const rankClass = t.finish === 1 ? 'analysis-rank top-1' : 'analysis-rank';

    // Show penalty inline if nonzero
    const penaltyHtml = t.penalty > 0
      ? `<span style="font-size:11px;color:var(--orange);font-weight:600;margin-right:4px;" title="Bracket conflict penalty">-${t.penalty}</span>`
      : '';

    html += `<div class="${classes.join(' ')}" onclick="this.classList.toggle('open')">
      <div class="analysis-team-header">
        <span class="${rankClass}">${t.finish}</span>
        <span class="analysis-team-name">Team #${t.teamNum} ${badges}</span>
        ${penaltyHtml}
        <span class="analysis-team-pts">${t.adjPts}</span>
        <span class="analysis-team-expand">&#9660;</span>
      </div>
      <div class="analysis-team-players">
        ${t.roster.sort((a, b) => b.pts - a.pts).map(p =>
          `<div class="analysis-player-row">
            <div><span class="analysis-player-name">${p.player}</span> <span class="analysis-player-team">${p.collegeteam} (${p.seed})</span></div>
            <span class="analysis-player-pts">${Math.round(p.pts)}</span>
          </div>`
        ).join('')}
        ${t.conflicts.length > 0 ? `<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--orange);">
          ${t.conflicts.map(c => `${c.t1} vs ${c.t2}: -${c.cost} pts (${c.label})`).join('<br>')}
        </div>` : ''}
        ${t.roster.length === 0 ? '<div style="color:var(--text-dim);font-size:12px;padding:4px 0;">No players</div>' : ''}
      </div>
    </div>`;
  }
  html += '</div>';

  // Scoring explanation
  html += `<div style="font-size:11px;color:var(--text-dim);margin-top:12px;padding:10px;background:var(--surface2);border-radius:6px;line-height:1.5;">
    <strong>How scoring works:</strong> Raw points = sum of each player's projected tournament points (PPG &times; expected games).
    Conflict penalty is per college-team pair based on when they'd meet: R1 opponents &minus;35%, R2 &minus;25%, Sweet 16 &minus;18%, Elite 8 &minus;12%, Final Four &minus;5% of the weaker team's total points on your roster.
    Teams that diversify across regions are rewarded.
  </div>`;

  html += `<div class="modal-actions" style="margin-top:16px;">
    <button class="btn-cancel" onclick="document.getElementById('analysis-modal').classList.remove('open')">Close</button>
  </div>`;

  content.innerHTML = html;
}

// Close analysis modal on overlay click
document.getElementById('analysis-modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});
</script>
